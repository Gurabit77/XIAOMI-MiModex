name: Build Releases

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS Apple Silicon
            os: macos-14
            sidecar_target: aarch64-apple-darwin
            sidecar_file: mimo-code-engine-aarch64-apple-darwin
            artifact_name: MiModex-macOS-Apple-Silicon
            build_script: tauri:build:signed
          - label: macOS Intel
            os: macos-15-intel
            sidecar_target: x86_64-apple-darwin
            sidecar_file: mimo-code-engine-x86_64-apple-darwin
            artifact_name: MiModex-macOS-Intel
            build_script: tauri:build:signed
          - label: Windows x64
            os: windows-latest
            sidecar_target: x86_64-pc-windows-msvc
            sidecar_file: mimo-code-engine-x86_64-pc-windows-msvc.exe
            artifact_name: MiModex-Windows-x64
            build_script: tauri:build:windows

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: npm ci

      - name: Prepare bundled MiModex engine
        run: node scripts/ensure-sidecar.mjs --target=${{ matrix.sidecar_target }} --force

      - name: Build desktop package
        run: npm run ${{ matrix.build_script }}

      - name: Collect macOS app
        if: runner.os == 'macOS'
        run: |
          mkdir -p artifacts
          ditto -c -k --keepParent "src-tauri/target/release/bundle/macos/MiModex.app" "artifacts/${{ matrix.artifact_name }}.zip"
          cp "src-tauri/bin/${{ matrix.sidecar_file }}" "artifacts/${{ matrix.sidecar_file }}"

      - name: Collect Windows installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force artifacts | Out-Null
          Copy-Item "src-tauri\target\release\bundle\nsis\*.exe" artifacts\
          Copy-Item "src-tauri\bin\${{ matrix.sidecar_file }}" artifacts\

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: artifacts/*

      - name: Upload release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          overwrite_files: true
          fail_on_unmatched_files: true
